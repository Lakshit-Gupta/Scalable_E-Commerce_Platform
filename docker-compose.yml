# Scalable E-Commerce Platform — full local stack.
# Startup is health-gated: datastores -> config-server -> eureka -> services -> gateway -> observability.
# Run:  docker compose up --build
# Scale a service:  docker compose up --scale user-service=2

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  elasticsearch-data:
  kafka-data:
  minio-data:
  tempo-data:
  loki-data:
  chatwoot-postgres-data:

# Dev: Vault off so services use plaintext env (env-fallback design; "env wins in dev"). The shared
# config-repo serves `spring.config.import: vault://` above the token line, so remote clients hit the
# import before the token binds → TOKEN-auth boot crash. Binding this via container env (highest
# precedence, available at bootstrap) skips the import cleanly. Drop it in prod so Vault fills secrets.
x-vault-off: &vault-off
  SPRING_CLOUD_VAULT_ENABLED: "false"

# Shared Chatwoot env (v0.2.2): self-hosted live chat. Own pgvector Postgres; reuses the stack Redis.
x-chatwoot-env: &chatwoot-env
  INSTALLATION_ENV: docker
  RAILS_ENV: production
  NODE_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
  SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:?set CHATWOOT_SECRET_KEY_BASE in .env}
  FRONTEND_URL: ${PUBLIC_CHATWOOT_BASE_URL:-http://localhost:3003}
  DEFAULT_LOCALE: en
  POSTGRES_HOST: chatwoot-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USERNAME: chatwoot
  POSTGRES_PASSWORD: ${CHATWOOT_DB_PASSWORD:?set CHATWOOT_DB_PASSWORD in .env}
  POSTGRES_DATABASE: chatwoot
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  # Dev: allow creating the first super-admin via the onboarding wizard. Set false once set up.
  ENABLE_ACCOUNT_SIGNUP: ${CHATWOOT_ENABLE_SIGNUP:-true}

services:

  # ==================== Data infrastructure ====================

  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "wal_level=logical"]   # required for Debezium CDC
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # creates users_db/products_db/orders_db/payments_db
    ports:
      # Host publish only for local psql; in-network is always postgres:5432. Override to dodge host clashes.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      ecommerce-network:
        # Debezium connects to `pg-rw` (the CNPG primary service name in k8s); this alias makes the
        # single shared connector config resolve to the same node in compose too.
        aliases:
          - pg-rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      # Host publish only (in-network access is always redis:6379). Override to avoid host conflicts.
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ecommerce
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-network

  # Kafka event streaming (v0.0.11): single-node KRaft (no ZooKeeper). Reachable at kafka:9092.
  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - ecommerce-network

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 60s

  # Object storage (v0.0.13): S3-compatible. Local stand-in for Cloudflare R2. API :9000, console :9001.
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ecommerce-network

  # ==================== Spring Cloud infrastructure ====================

  config-server:
    build: ./infrastructure/config-server
    ports:
      - "8888:8888"
    networks:
      - ecommerce-network
    healthcheck:
      # alpine JRE image has no curl — use busybox wget
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s

  eureka-server:
    build: ./infrastructure/eureka-server
    depends_on:
      config-server:
        condition: service_healthy
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s

  api-gateway:
    build: ./infrastructure/api-gateway
    depends_on:
      eureka-server:
        condition: service_started
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy   # JWKS reachable for token validation
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8080:8080"   # only port exposed to clients
    networks:
      - ecommerce-network

  # Identity provider (v0.0.9): OIDC/OAuth2. Realm 'ecommerce' imported on start.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./k8s/base/realm-ecommerce.json:/opt/keycloak/data/import/realm-ecommerce.json:ro
    ports:
      - "8081:8080"   # Keycloak admin console + token/JWKS endpoints
    networks:
      - ecommerce-network
    healthcheck:
      # image has bash only (no curl/wget) — probe the management health port via /dev/tcp
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ==================== Microservices ====================

  user-service:
    build:
      context: .                            # repo root: reactor builds :common then this service
      dockerfile: services/user-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      <<: *vault-off
      DB_PASSWORD: ${DB_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ecommerce
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_CLIENT_ID: ecommerce-app
    networks:
      - ecommerce-network

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
    environment:
      <<: *vault-off
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - ecommerce-network

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      <<: *vault-off
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - ecommerce-network

  # Debezium Kafka Connect: reads the order-service outbox table via PostgreSQL WAL (CDC).
  # Replaces the @Scheduled OutboxRelay poller — lower latency, no polling, at-least-once.
  kafka-connect:
    image: debezium/connect:2.6
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-order-outbox
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      ENABLE_APICURIO_CONVERTERS: "true"   # Apicurio JSON-Schema converter for order-events (v0.1.12)
    ports:
      - "8083:8083"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Apicurio Schema Registry (v0.1.12): versions the order-events JSON Schema; Debezium's Apicurio
  # converter auto-registers it and BACKWARD compatibility is enforced on new versions. In-memory (dev).
  apicurio-registry:
    image: apicurio/apicurio-registry-mem:2.6.2.Final
    environment:
      REGISTRY_RULES_GLOBAL_COMPATIBILITY: "BACKWARD"
    ports:
      - "8085:8080"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/apis/registry/v2/system/info || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # HashiCorp Vault (v0.1.13): secrets backend. Dev mode = auto-unsealed, in-memory, root token "root".
  # Services read secret/application via Spring Cloud Vault (optional import — env stays the fallback).
  # PROD: real storage + AppRole/Kubernetes auth, never a static root token.
  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Seeds Vault with the same secret values compose already uses, so Vault mirrors env in dev.
  vault-seed:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    entrypoint:
      - sh
      - -c
      - |
        vault kv put secret/application \
          DB_PASSWORD="${DB_PASSWORD:-ecommerce}" \
          REDIS_PASSWORD="${REDIS_PASSWORD:-}" \
          RABBITMQ_PASSWORD="${RABBITMQ_PASSWORD:-guest}" \
          STORAGE_ACCESS_KEY="${STORAGE_ACCESS_KEY:-minioadmin}" \
          STORAGE_SECRET_KEY="${STORAGE_SECRET_KEY:-minioadmin}" \
          PAYLOAD_SECRET="${PAYLOAD_SECRET:-cms-dev-secret-change-me}"
    networks:
      - ecommerce-network

  # Registers the Debezium connector once Kafka Connect is healthy.
  debezium-connector-init:
    image: curlimages/curl:latest
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./k8s/base/order-outbox-connector.json:/config/order-outbox-connector.json:ro
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
    # Substitute the DB password into the mounted connector template, then upsert the connector
    # (PUT /config is idempotent — safe across restarts). Single sh command to avoid YAML newline pitfalls.
    entrypoint:
      - sh
      - -c
      - |
        sed "s/__DB_PASSWORD__/${DB_PASSWORD}/" /config/order-outbox-connector.json > /tmp/connector.json
        for i in $$(seq 1 30); do
          code=$$(curl -s -o /tmp/resp -w "%{http_code}" -X POST \
            -H 'Content-Type: application/json' \
            --data @/tmp/connector.json \
            http://kafka-connect:8083/connectors)
          echo "attempt $$i -> HTTP $$code"; cat /tmp/resp; echo
          if [ "$$code" = "200" ] || [ "$$code" = "201" ] || [ "$$code" = "409" ]; then echo "connector registered"; exit 0; fi
          sleep 5
        done
        echo "failed to register connector"; exit 1
    networks:
      - ecommerce-network
    restart: on-failure

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
    environment:
      <<: *vault-off
      DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      OUTBOX_RELAY_ENABLED: "false"   # Debezium CDC handles outbox publishing
    networks:
      - ecommerce-network

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      <<: *vault-off
      DB_PASSWORD: ${DB_PASSWORD}
      # Provider selection (v0.0.15): stripe (default) | razorpay | stub. Falls back to stub if keys absent.
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-stripe}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    networks:
      - ecommerce-network

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
    environment:
      <<: *vault-off
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      # Transactional email (v0.0.8). Unset -> notification-service logs instead of sending.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-orders@example.com}
      # Product analytics (v0.0.17). Unset -> capture is a no-op.
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
      # Chatwoot inbound webhooks (v0.1.2): shared secret sent as X-Chatwoot-Token. Unset -> accept+log.
      CHATWOOT_WEBHOOK_TOKEN: ${CHATWOOT_WEBHOOK_TOKEN:-}
      # Transactional SMS via Twilio (v0.1.3). Any unset -> SMS logs instead of sending.
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
    networks:
      - ecommerce-network

  # Recommendations (v0.0.12): consumes the Kafka order-event stream, serves trending + co-purchase.
  recommendation-service:
    build:
      context: .
      dockerfile: services/recommendation-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
    environment:
      <<: *vault-off
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - ecommerce-network

  # ==================== Support (Chatwoot live chat) ====================
  # Self-hosted Chatwoot (v0.2.2). Isolated Postgres (needs pgvector); reuses the stack Redis.
  # First boot: open http://localhost:3003 → onboarding creates the super-admin + account, then
  # add a "Website" inbox and paste its token into PUBLIC_CHATWOOT_WEBSITE_TOKEN, restart storefront.

  chatwoot-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${CHATWOOT_DB_PASSWORD:?set CHATWOOT_DB_PASSWORD in .env}
    volumes:
      - chatwoot-postgres-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-off DB prepare (create+schema+seed on fresh, migrate on existing). rails.sh entrypoint
  # only waits for the DB — it does not migrate — so web/sidekiq gate on this completing.
  chatwoot-init:
    image: chatwoot/chatwoot:v3.16.0
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *chatwoot-env
    entrypoint: ["docker/entrypoints/rails.sh"]
    command: ["bundle", "exec", "rails", "db:chatwoot_prepare"]
    networks:
      - ecommerce-network
    restart: on-failure

  chatwoot-web:
    image: chatwoot/chatwoot:v3.16.0
    depends_on:
      chatwoot-init:
        condition: service_completed_successfully
    environment: *chatwoot-env
    entrypoint: ["docker/entrypoints/rails.sh"]
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    ports:
      - "3003:3000"
    networks:
      - ecommerce-network
    healthcheck:
      # / 302-redirects to onboarding; /api returns 200 directly once Rails is up.
      # 127.0.0.1 (not localhost): container localhost resolves ::1 first, but Rails binds IPv4.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v3.16.0
    depends_on:
      chatwoot-init:
        condition: service_completed_successfully
    environment: *chatwoot-env
    entrypoint: ["docker/entrypoints/rails.sh"]
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    networks:
      - ecommerce-network

  # ==================== Observability ====================

  # Distributed tracing backend (v0.0.7): receives OTLP spans, serves the trace UI.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"   # accept OTLP on 4317 (gRPC) / 4318 (HTTP)
    ports:
      - "16686:16686"   # Jaeger UI
    networks:
      - ecommerce-network

  # OpenTelemetry Collector (v0.1.5): single OTLP ingest; fans traces to Tempo + Jaeger.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel/config.yaml:ro
    depends_on:
      - tempo
      - jaeger
    networks:
      - ecommerce-network

  # Grafana Tempo (v0.1.5): trace store, OTLP in, queried by Grafana.
  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - ecommerce-network

  # Grafana Loki (v0.1.5): log store.
  loki:
    image: grafana/loki:3.2.0
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    networks:
      - ecommerce-network

  # Promtail (v0.1.5): ships container logs to Loki (Docker service discovery).
  promtail:
    image: grafana/promtail:3.2.0
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    volumes:
      - ./observability/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - ecommerce-network

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - ecommerce-network

  grafana:
    image: grafana/grafana:10.4.0
    depends_on:
      - prometheus
      - tempo
      - loki
    volumes:
      # Datasource provisioning (v0.1.5): Prometheus + Tempo + Loki + Jaeger auto-wired.
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    networks:
      - ecommerce-network

  # ==================== Frontend ====================

  # Svelte 5 + SvelteKit storefront (v0.0.16). SSR/BFF: server load functions call the gateway.
  storefront:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      api-gateway:
        condition: service_started
      keycloak:
        condition: service_healthy
      cms:
        condition: service_started
    ports:
      - "${STOREFRONT_HOST_PORT:-3000}:3000"
    environment:
      GATEWAY_URL: http://api-gateway:8080   # server-to-server (BFF); browser never hits the gateway directly
      # Headless CMS (v0.1.1): storefront BFF reads content (blog, pages, product enrichment) server-to-server.
      CMS_URL: http://cms:3000
      # adapter-node public origin (v0.1.0): required for SvelteKit form-action CSRF behind a proxy/CDN.
      # In prod set this to the public storefront URL (e.g. https://shop.example.com via Cloudflare).
      ORIGIN: ${STOREFRONT_ORIGIN:-http://localhost:3000}
      # Auth (v0.1.0): server-to-server Keycloak password-grant login; token stored in an httpOnly cookie.
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/ecommerce/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: ecommerce-app
      PORT: "3000"
      # Product analytics (v0.0.17), client-side. Unset -> PostHog is not initialised.
      PUBLIC_POSTHOG_KEY: ${PUBLIC_POSTHOG_KEY:-}
      PUBLIC_POSTHOG_HOST: ${PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
      # Live-chat support (v0.0.18), client-side. Both unset -> Chatwoot widget is not loaded.
      PUBLIC_CHATWOOT_BASE_URL: ${PUBLIC_CHATWOOT_BASE_URL:-}
      PUBLIC_CHATWOOT_WEBSITE_TOKEN: ${PUBLIC_CHATWOOT_WEBSITE_TOKEN:-}
      # Chatwoot identity validation (v0.1.2), server-only secret. Unset -> visitors stay anonymous.
      CHATWOOT_HMAC_TOKEN: ${CHATWOOT_HMAC_TOKEN:-}
    networks:
      - ecommerce-network

  # ==================== Content (CMS) ====================

  # Headless CMS (v0.1.1): Payload (Next.js). Admin UI + REST/GraphQL content API on :3002.
  # Owns cms_db (db-per-service). Serves marketing pages, blog posts, and product enrichment
  # consumed by the storefront BFF. Dev auto-syncs its schema (push); prod ships migrations.
  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgres://ecommerce:${DB_PASSWORD}@postgres:5432/cms_db
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-payload-secret-change-me}
      CMS_PUBLIC_URL: ${CMS_PUBLIC_URL:-http://localhost:3002}
      CMS_CORS_ORIGINS: ${STOREFRONT_ORIGIN:-http://localhost:3000}
      # Media object storage (v0.1.4): same MinIO/R2 S3 API as product-service, own bucket.
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET: ${CMS_STORAGE_BUCKET:-cms-media}
      PORT: "3000"
    ports:
      - "3002:3000"
    networks:
      - ecommerce-network
    healthcheck:
      # node:alpine ships busybox wget; /admin serves 200 once migrations run + Next is up.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/admin || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
