# Spring Cloud infra (v0.1.7): config-server, eureka-server, api-gateway. Eureka is kept as the
# discovery registry in-cluster (services already use it; gRPC resolves via discovery:///). Images
# come from the GHCR workflow (.github/workflows/images.yml); override the registry via kustomize.
# ----------------------------------------------------------------------------- config-server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
spec:
  replicas: 1
  selector:
    matchLabels: { app: config-server }
  template:
    metadata:
      labels: { app: config-server }
    spec:
      containers:
        - name: config-server
          image: ghcr.io/lakshit-gupta/scalable_e-commerce_platform/config-server:latest
          ports: [{ containerPort: 8888 }]
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8888 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
spec:
  selector: { app: config-server }
  ports: [{ port: 8888, targetPort: 8888 }]
---
# ----------------------------------------------------------------------------- eureka-server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
spec:
  replicas: 1
  selector:
    matchLabels: { app: eureka-server }
  template:
    metadata:
      labels: { app: eureka-server }
    spec:
      containers:
        - name: eureka-server
          image: ghcr.io/lakshit-gupta/scalable_e-commerce_platform/eureka-server:latest
          ports: [{ containerPort: 8761 }]
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8761 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
spec:
  selector: { app: eureka-server }
  ports: [{ port: 8761, targetPort: 8761 }]
---
# ----------------------------------------------------------------------------- api-gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/lakshit-gupta/scalable_e-commerce_platform/api-gateway:latest
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits: { memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector: { app: api-gateway }
  ports: [{ port: 8080, targetPort: 8080 }]
