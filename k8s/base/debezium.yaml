# Debezium CDC (v0.1.8) — mirrors the docker-compose kafka-connect + connector-init. Reads the
# order-service outbox table via Postgres WAL (needs wal_level=logical, set on the postgres pod) and
# publishes to ecommerce.order-events, replacing the @Scheduled OutboxRelay poller. With this deployed
# order-service runs with OUTBOX_RELAY_ENABLED=false (see services.yaml). The connector template
# ConfigMap (debezium-connector-config) is generated from order-outbox-connector.json by kustomize.
# ----------------------------------------------------------------------------- kafka-connect
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-connect
spec:
  replicas: 1
  selector:
    matchLabels: { app: kafka-connect }
  template:
    metadata:
      labels: { app: kafka-connect }
    spec:
      containers:
        - name: kafka-connect
          image: debezium/connect:2.6
          env:
            - { name: BOOTSTRAP_SERVERS, value: "kafka:9092" }
            - { name: GROUP_ID, value: "debezium-order-outbox" }
            - { name: CONFIG_STORAGE_TOPIC, value: "debezium_connect_configs" }
            - { name: OFFSET_STORAGE_TOPIC, value: "debezium_connect_offsets" }
            - { name: STATUS_STORAGE_TOPIC, value: "debezium_connect_statuses" }
            - { name: CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE, value: "false" }
            - { name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE, value: "false" }
            - { name: ENABLE_APICURIO_CONVERTERS, value: "true" }   # adds Apicurio converter jars to the classpath
            # image default is -Xmx2G, which overruns the container limit under CDC load → OOMKill
            - { name: HEAP_OPTS, value: "-Xms256m -Xmx1g" }
          ports: [{ containerPort: 8083 }]
          readinessProbe:
            httpGet: { path: /, port: 8083 }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits: { memory: "1536Mi" }   # 1g heap + metaspace/native (768Mi OOMKilled under load)
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-connect
spec:
  selector: { app: kafka-connect }
  ports: [{ port: 8083, targetPort: 8083 }]
---
# Registers the connector once Kafka Connect is up. Substitutes the DB password into the mounted
# connector template, then POSTs it (retry loop; 409 on re-run = already registered = success).
apiVersion: batch/v1
kind: Job
metadata:
  name: debezium-connector-init
spec:
  backoffLimit: 3
  template:
    metadata:
      labels: { app: debezium-connector-init }
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: connector-config
          configMap: { name: debezium-connector-config }
      containers:
        - name: init
          image: curlimages/curl:latest
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secrets, key: DB_PASSWORD } }
          volumeMounts:
            - { name: connector-config, mountPath: /config, readOnly: true }
          command: ["sh", "-c"]
          args:
            - |
              sed "s/__DB_PASSWORD__/${DB_PASSWORD}/" /config/order-outbox-connector.json > /tmp/connector.json
              for i in $(seq 1 30); do
                code=$(curl -s -o /tmp/resp -w "%{http_code}" -X POST \
                  -H 'Content-Type: application/json' \
                  --data @/tmp/connector.json \
                  http://kafka-connect:8083/connectors)
                echo "attempt $i -> HTTP $code"; cat /tmp/resp; echo
                if [ "$code" = "200" ] || [ "$code" = "201" ] || [ "$code" = "409" ]; then echo "connector registered"; exit 0; fi
                sleep 5
              done
              echo "failed to register connector"; exit 1
