# ----------------------------------------------------------------------------- order-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector: { matchLabels: { app: order-service } }
  template:
    metadata:
      labels: { app: order-service }
    spec:
      containers:
        - name: order-service
          image: ghcr.io/lakshit-gupta/scalable_e-commerce_platform/order-service:latest
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          env:
            - { name: OUTBOX_RELAY_ENABLED, value: "false" }   # Debezium CDC (debezium.yaml) publishes the outbox
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits: { memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector: { app: order-service }
  ports: [{ port: 8080, targetPort: 8080 }]
---
# ----------------------------------------------------------------------------- payment-service (+ gRPC)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 1
  selector: { matchLabels: { app: payment-service } }
  template:
    metadata:
      labels: { app: payment-service }
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/lakshit-gupta/scalable_e-commerce_platform/payment-service:latest
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          ports:
            - { name: http, containerPort: 8080 }
            - { name: grpc, containerPort: 9090 }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits: { memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector: { app: payment-service }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: grpc, port: 9090, targetPort: 9090 }
---
