# Application microservices (v0.1.7). Stateless Spring Boot MVC + virtual threads; envFrom injects
# the shared ConfigMap + Secret (DB/Redis/Rabbit/Kafka hosts + passwords). All listen on 8080 and
# register with Eureka. Images from GHCR. HPAs live in hpa.yaml.
# ----------------------------------------------------------------------------- user-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector: { matchLabels: { app: user-service } }
  template:
    metadata:
      labels: { app: user-service }
    spec:
      containers:
        - name: user-service
          image: ghcr.io/lakshit-gupta/scalable_e-commerce_platform/user-service:latest
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits: { memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector: { app: user-service }
  ports: [{ port: 8080, targetPort: 8080 }]
---
