# Horizontal Pod Autoscalers (v0.1.7) for the stateless tier. CPU-target based (needs metrics-server).
# Each targets its Deployment; resource requests are set on the pods so utilisation is computable.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api-gateway }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api-gateway }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
