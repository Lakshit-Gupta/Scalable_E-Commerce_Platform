name: Images (build + scan + push)

# v0.1.6: build every service/infra/frontend/cms image, scan it with Trivy (report-only, like the
# OWASP job), and push to GHCR. Pushes only on push to main/master — PRs build + scan but never push.
# Trivy is non-blocking by design (exit-code 0), matching the project's report-only supply-chain stance;
# SARIF reports are uploaded as artifacts. Uses only trusted contexts (repo/sha/actor) via env — no
# untrusted event input in run: steps.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push images to GHCR

jobs:
  images:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Java services: build context = repo ROOT so the Maven reactor builds :common/:proto first.
          - { name: user-service,           context: ".", dockerfile: services/user-service/Dockerfile }
          - { name: product-service,        context: ".", dockerfile: services/product-service/Dockerfile }
          - { name: cart-service,           context: ".", dockerfile: services/cart-service/Dockerfile }
          - { name: order-service,          context: ".", dockerfile: services/order-service/Dockerfile }
          - { name: payment-service,        context: ".", dockerfile: services/payment-service/Dockerfile }
          - { name: notification-service,   context: ".", dockerfile: services/notification-service/Dockerfile }
          - { name: recommendation-service, context: ".", dockerfile: services/recommendation-service/Dockerfile }
          # Infra modules: build context = module dir.
          - { name: config-server, context: infrastructure/config-server, dockerfile: infrastructure/config-server/Dockerfile }
          - { name: eureka-server, context: infrastructure/eureka-server, dockerfile: infrastructure/eureka-server/Dockerfile }
          - { name: api-gateway,   context: infrastructure/api-gateway,   dockerfile: infrastructure/api-gateway/Dockerfile }
          # Node apps.
          - { name: storefront, context: frontend, dockerfile: frontend/Dockerfile }
          - { name: cms,        context: cms,      dockerfile: cms/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR needs a lowercase image path; the owner may contain uppercase.
      - name: Compute image ref
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.name }}" >> "$GITHUB_ENV"
          echo "SHA_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      # Build and load into the local daemon so Trivy can scan the exact image before any push.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ env.IMAGE }}:${{ env.SHA_TAG }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Trivy scan (report-only)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.SHA_TAG }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'   # non-blocking (report-only), matches the OWASP job

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.sarif
          if-no-files-found: ignore

      # Push only for branch builds (never PRs). Tags: <sha> and latest.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          docker tag "$IMAGE:$SHA_TAG" "$IMAGE:latest"
          docker push "$IMAGE:$SHA_TAG"
          docker push "$IMAGE:latest"
