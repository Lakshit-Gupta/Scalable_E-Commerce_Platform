name: CI

# v0.0.5: first CI pipeline.
#  - build: reactor build of all 11 modules (Java 21), proves the tree compiles + packages.
#  - security: OWASP Dependency-Check (profile 'security'), non-blocking, uploads the report.
# Add the NVD_API_KEY repo secret (https://nvd.nist.gov/developers/request-an-api-key) so the
# vulnerability DB sync is fast and not rate-limited. Without it the scan still runs (slower).

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (reactor, Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build + package (skip tests)
        run: mvn -B -ntp -DskipTests package

  security:
    name: OWASP Dependency-Check (non-blocking)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Cache NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-nvd-${{ runner.os }}
          restore-keys: dependency-check-nvd-
      - name: Run Dependency-Check (aggregate)
        # Secret is read from env (not interpolated into the command) to avoid injection.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: >
          mvn -B -ntp -Psecurity -DskipTests
          org.owasp:dependency-check-maven:aggregate
          -DnvdApiKey="$NVD_API_KEY"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
          if-no-files-found: ignore
