server:
  port: 8080

spring:
  application:
    name: product-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/products_db
    username: ecommerce
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  cache:
    type: redis
    redis:
      time-to-live: 1800000   # 30 min default TTL
      cache-null-values: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
  elasticsearch:
    uris: http://${ES_HOST:elasticsearch}:9200
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ecommerce
    password: ${RABBITMQ_PASSWORD:}

# Object storage (v0.0.13): S3-compatible. MinIO locally; swap to Cloudflare R2 in prod via env.
storage:
  endpoint: ${STORAGE_ENDPOINT:http://minio:9000}
  region: ${STORAGE_REGION:us-east-1}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin}
  bucket: ${STORAGE_BUCKET:product-media}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,refresh

logging:
  pattern:
    # correlationId is set per request by common-lib's CorrelationIdFilter (MDC); empty pre-filter.
    level: "%5p [%X{correlationId:-}]"
