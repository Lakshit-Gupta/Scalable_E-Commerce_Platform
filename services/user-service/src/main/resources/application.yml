server:
  port: 8080

spring:
  application:
    name: user-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
  threads:
    virtual:
      enabled: true        # Java 21 virtual threads
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/users_db
    username: ecommerce
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update     # dev convenience; production uses Flyway migrations
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,refresh

logging:
  pattern:
    # correlationId is set per request by common-lib's CorrelationIdFilter (MDC); empty pre-filter.
    level: "%5p [%X{correlationId:-}]"
