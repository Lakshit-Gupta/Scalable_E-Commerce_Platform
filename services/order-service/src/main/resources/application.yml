server:
  port: 8080

spring:
  application:
    name: order-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/orders_db
    username: ecommerce
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20      # max DB connections per service instance
      minimum-idle: 5            # keep 5 connections warm
      connection-timeout: 30000  # wait 30s for a connection before erroring
      idle-timeout: 600000       # close idle connections after 10 min
      max-lifetime: 1800000      # recycle connections every 30 min
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ecommerce
    password: ${RABBITMQ_PASSWORD:}
  # Kafka producer (v0.0.11): outbox relay publishes order domain events as JSON strings.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

grpc:
  client:
    payment:
      address: 'discovery:///PAYMENT-SERVICE'   # resolve payment-service via Eureka
      negotiation-type: plaintext               # no TLS on the internal network
    product:
      address: 'discovery:///PRODUCT-SERVICE'   # stock reservation saga (Reserve/Confirm/Release)
      negotiation-type: plaintext

# Circuit breaker for the order->payment gRPC call (Spring Cloud CircuitBreakerFactory id "payment").
resilience4j:
  circuitbreaker:
    instances:
      payment:
        failure-rate-threshold: 50         # open if 50% fail
        slow-call-rate-threshold: 80       # also open if 80% are slow
        slow-call-duration-threshold: 3s   # "slow" = >3 seconds
        sliding-window-size: 20            # measure last 20 calls
        wait-duration-in-open-state: 30s   # stay open 30s
        permitted-number-of-calls-in-half-open-state: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,refresh

logging:
  pattern:
    # correlationId is set per request by common-lib's CorrelationIdFilter (MDC); empty pre-filter.
    level: "%5p [%X{correlationId:-}]"
