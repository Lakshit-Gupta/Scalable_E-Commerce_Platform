server:
  port: 8080

grpc:
  server:
    port: 9090   # internal gRPC (order-service -> payment-service)

spring:
  application:
    name: payment-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/payments_db
    username: ecommerce
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true
    metadata-map:
      # net.devh discovery:/// reads the gRPC port from this metadata key (HTTP is 8080, gRPC 9090)
      "gRPC.port": 9090

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,refresh

logging:
  pattern:
    # correlationId is set per request by common-lib's CorrelationIdFilter (MDC); empty pre-filter.
    level: "%5p [%X{correlationId:-}]"
