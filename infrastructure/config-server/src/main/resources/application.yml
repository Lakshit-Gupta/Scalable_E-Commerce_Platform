server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native   # local: serve config from classpath, no external Git repo needed
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config-repo/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
